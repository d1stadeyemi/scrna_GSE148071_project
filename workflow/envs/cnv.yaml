name: cnv
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.9,<3.12
  - scanpy>=1.9
  - anndata>=0.9
  - pandas
  - numpy
  - scipy
  - matplotlib
  - seaborn
  - scikit-learn
  - h5py
  - ktplotspy           # optional: for advanced CNV visualization
  - pip
  - pip:
    - infercnvpy>=0.4.3