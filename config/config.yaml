# =============================================================================
# GSE148071 scRNA-seq Pipeline Configuration
# Wu et al. 2021 — Advanced NSCLC Tumor Microenvironment
# =============================================================================

# --- GEO Data ---
geo:
  accession:  GSE148071
  base_url:   https://ftp.ncbi.nlm.nih.gov/geo/series/GSE148nnn/GSE148071/suppl/
  matrix_url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE148nnn/GSE148071/matrix/GSE148071_series_matrix.txt.gz

files:
  raw_tar:       GSE148071_RAW.tar
  series_matrix: GSE148071_series_matrix.txt.gz

paths:
  raw_dir: data/raw

# --- QC Thresholds (from Wu et al. 2021 Methods) ---
# "We removed cells that had either lower than 200 or higher than 5000
#  expressed genes... mitochondria content higher than 30%"
qc:
  min_genes:  200
  max_genes:  5000
  max_pct_mt: 30.0
  min_cells:  3

# --- Paper Track (no batch correction, faithful to publication) ---
# Follows Wu et al. 2021 Methods exactly:
# "Seurat 2.3 FindVariable function to select top 600 variable genes"
# "first 20 principle components and resolution 1.0"
# "opted out the batch effect correction algorithm"
paper_track:
  n_hvgs:        600
  hvg_flavor:    "seurat"     # Seurat 2.3 equivalent
  n_pcs:         20
  n_neighbors:   15
  use_rep:       "X_pca"      # No batch correction — use PCA directly

# --- Alternative Track (modern best practice with scVI) ---
# Uses modern methods for comparison and to demonstrate batch correction impact
alternative_track:
  n_hvgs:        3000
  hvg_flavor:    "seurat_v3"  # Variance-stabilising, batch-aware
  n_pcs:         50
  n_latent:      30           # scVI latent dimensions
  n_epochs:      400
  batch_size:    128
  n_neighbors:   15
  use_rep:       "X_scvi"     # scVI latent space

# --- Clustering and Annotation ---
# target_clusters: paper reports 37 clusters at resolution 1.0
# We sweep resolutions and select biologically using silhouette + cluster count
annotation:
  res_min:          0.5
  res_max:          1.5
  target_clusters:  37       # paper's reported cluster count
  min_cells_per_cluster: 50  # discard clusters smaller than this

# --- Stage 7: CNV Inference ---
# Reproduces paper Methods: "InferCNV using single-cell transcriptomic profiles"
# Reference: immune cells + stromal cells (known diploid)
# Window: 101 genes (paper exact value)
cnv:
  # Path to GTF file for gene positions (leave empty to use built-in GRCh38)
  # If you have the GTF: gtf_path: "/path/to/Homo_sapiens.GRCh38.92.gtf"
  gtf_path:         ""
 
  # CNV score threshold for malignancy classification
  # Cells with CNV score above this are classified as confirmed malignant
  # Lower = more sensitive, Higher = more specific
  cnv_threshold:    0.03
 
  # Cells per patient in CNV heatmap (paper uses 100)
  n_cells_heatmap:  100