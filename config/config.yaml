geo:
  accession: GSE148071
  base_url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE148nnn/GSE148071/suppl/
  matrix_url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE148nnn/GSE148071/matrix/GSE148071_series_matrix.txt.gz

files:
  raw_tar: GSE148071_RAW.tar
  series_matrix: GSE148071_series_matrix.txt.gz

paths:
  raw_dir: data/raw

qc:
  min_genes:  200     # remove empty/dying cells
  max_genes:  5000    # remove likely doublets (according to the publication)
  max_pct_mt: 30      # remove dying cells (according to the publication)
  min_cells:  3       # remove genes expressed in fewer than 3 cells

# Track A — paper-faithful (no batch correction)
paper_track:
  n_hvgs:        600       # paper's exact value
  hvg_flavor:    "seurat"  # paper's Seurat 2.3 method
  n_pcs:         20        # paper uses first 20 PCs
  n_neighbors:   15
  batch_correct: false

# Track B — modern best practice (scVI)
alternative_track:
  n_hvgs:        3000
  hvg_flavor:    "seurat_v3"
  n_latent:      30
  n_epochs:      400
  batch_size:    128
  n_neighbors:   15
  batch_correct: true

annotation:
  resolution: 1.0