geo:
  accession: GSE148071
  base_url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE148nnn/GSE148071/suppl/

files:
  raw_tar: GSE148071_RAW.tar
  series_matrix: GSE148071_series_matrix.txt.gz

paths:
  raw_dir: data/raw

qc:
  min_genes:  200     # remove empty/dying cells
  max_genes:  6000    # remove likely doublets
  max_pct_mt: 25.0    # remove dying cells (paper uses ~25%)
  min_cells:  3       # remove genes expressed in fewer than 3 cells